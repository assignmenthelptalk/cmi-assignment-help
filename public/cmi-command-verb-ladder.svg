<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" width="700" height="520" font-family="Inter, system-ui, sans-serif">

  <!-- Background -->
  <rect width="700" height="520" fill="#f9fafb" rx="12"/>

  <!-- Title -->
  <text x="350" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#1a2e4a">CMI Command Verb Cognitive Depth Ladder</text>
  <text x="350" y="56" text-anchor="middle" font-size="12" fill="#6b7280">From foundational knowledge to critical evaluation — each tier contains all tiers below it</text>

  <!-- Tier 6 — Critical Evaluation (top, narrowest) -->
  <polygon points="280,76 420,76 460,120 240,120" fill="#1a2e4a"/>
  <text x="350" y="96" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">CRITICAL EVALUATION</text>
  <text x="350" y="111" text-anchor="middle" font-size="10" fill="#25D366">Critically Analyse · Critically Evaluate</text>
  <text x="472" y="100" text-anchor="start" font-size="10" fill="#6b7280">Level 6–7</text>

  <!-- Tier 5 — Evaluation -->
  <polygon points="240,124 460,124 500,172 200,172" fill="#1e3a5f"/>
  <text x="350" y="143" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">EVALUATION</text>
  <text x="350" y="160" text-anchor="middle" font-size="10" fill="#a7f3d0">Evaluate · Justify · Assess · Review · Develop a Plan</text>
  <text x="506" y="150" text-anchor="start" font-size="10" fill="#6b7280">Level 5–6</text>

  <!-- Tier 4 — Analysis -->
  <polygon points="200,176 500,176 542,228 158,228" fill="#2d5282"/>
  <text x="350" y="196" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">ANALYSIS</text>
  <text x="350" y="214" text-anchor="middle" font-size="10" fill="#bfdbfe">Discuss · Analyse · Compare · Contrast</text>
  <text x="548" y="204" text-anchor="start" font-size="10" fill="#6b7280">Level 4–5</text>

  <!-- Tier 3 — Application -->
  <polygon points="158,232 542,232 584,284 116,284" fill="#3b6ba8"/>
  <text x="350" y="252" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">APPLICATION</text>
  <text x="350" y="270" text-anchor="middle" font-size="10" fill="#dbeafe">Demonstrate · Apply · Propose</text>
  <text x="590" y="260" text-anchor="start" font-size="10" fill="#6b7280">Level 3–6</text>

  <!-- Tier 2 — Understanding -->
  <polygon points="116,288 584,288 626,344 74,344" fill="#4a85c8"/>
  <text x="350" y="308" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">UNDERSTANDING</text>
  <text x="350" y="326" text-anchor="middle" font-size="10" fill="#eff6ff">Explain · Review (process level)</text>
  <text x="632" y="318" text-anchor="start" font-size="10" fill="#6b7280">Level 3–4</text>

  <!-- Tier 1 — Knowledge (base, widest) -->
  <polygon points="74,348 626,348 668,408 32,408" fill="#5e9de0"/>
  <text x="350" y="372" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">KNOWLEDGE</text>
  <text x="350" y="390" text-anchor="middle" font-size="10" fill="#eff6ff">Identify · Describe</text>
  <text x="14" y="380" text-anchor="start" font-size="10" fill="#6b7280">Level 3</text>

  <!-- Arrow label -->
  <line x1="28" y1="420" x2="28" y2="76" stroke="#1a2e4a" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#1a2e4a"/>
    </marker>
  </defs>
  <text x="18" y="250" text-anchor="middle" font-size="11" fill="#1a2e4a" font-weight="600" transform="rotate(-90, 18, 250)">Cognitive Demand Increases</text>

  <!-- Key principle -->
  <rect x="60" y="422" width="580" height="44" rx="8" fill="#ecfdf5" stroke="#25D366" stroke-width="1.5"/>
  <text x="350" y="440" text-anchor="middle" font-size="11" font-weight="600" fill="#1a2e4a">Key principle: each higher verb contains all lower verbs within it.</text>
  <text x="350" y="457" text-anchor="middle" font-size="11" fill="#374151">To Critically Evaluate, you must first Identify, Analyse, and Evaluate — then challenge the evaluation criteria themselves.</text>

  <!-- Footer -->
  <text x="350" y="498" text-anchor="middle" font-size="10" fill="#9ca3af">cmiassignmentsupport.co.uk · CMI Command Verbs Guide</text>

</svg>
